<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Moody Diagram</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Moody Diagram Calculator</h1>
            <p>Determine friction factor from Reynolds number and relative roughness</p>
        </header>
        
        <main class="main-content">
            <aside class="sidebar">
                <div class="card inputs-card">
                    <h2>Inputs</h2>
                    <div class="input-group">
                        <label for="diameter">Internal Diameter (D) [m]</label>
                        <input type="number" id="diameter" value="0.1" step="any">
                    </div>

                    <div class="input-group">
                        <label for="materialList">Pipe Material Presets</label>
                        <select id="materialList">
                            <option value="custom">Custom</option>
                            <option value="0.0000015">PVC / Smooth Plastic</option>
                            <option value="0.0000015">Copper / Brass</option>
                            <option value="0.000045" selected>Commercial Steel</option>
                            <option value="0.00015">Galvanized Iron</option>
                            <option value="0.00026">Cast Iron</option>
                            <option value="0.001">Concrete, rough</option>
                        </select>
                    </div>
                    <div class="input-group indented">
                        <label for="roughness">Internal Roughness Height (ε) [m]</label>
                        <input type="number" id="roughness" value="0.000045" step="any">
                    </div>

                    <div class="input-group">
                        <label for="fluidList">Fluid Presets</label>
                        <select id="fluidList">
                            <option value="custom">Custom</option>
                            <option value="water" selected>Water (20°C)</option>
                            <option value="air">Air (20°C)</option>
                            <option value="oil">Engine Oil (20°C)</option>
                        </select>
                    </div>
                    <div class="input-group indented">
                        <label for="density">Density (ρ) [kg/m³]</label>
                        <input type="number" id="density" value="998" step="any">
                    </div>
                    <div class="input-group indented">
                        <label for="kinematic_viscosity">Kinematic Viscosity (ν) [m²/s]</label>
                        <input type="number" id="kinematic_viscosity" value="0.000001004" step="any">
                    </div>

                    <div class="input-group">
                        <label for="flow_rate">Flow Rate (Q) [m³/s]</label>
                        <input type="number" id="flow_rate" value="0.02" step="any">
                    </div>
                </div>

                <div class="card results-card">
                    <h2>Results</h2>
                    <div class="result-item">
                        <span class="label">Reynolds Number (Re):</span>
                        <span class="value" id="res-re">---</span>
                    </div>
                    <div class="result-item">
                        <span class="label">Relative Roughness (ε/D):</span>
                        <span class="value" id="res-rr">---</span>
                    </div>
                    <div class="result-item">
                        <span class="label">Flow Regime:</span>
                        <span class="value" id="res-regime">---</span>
                    </div>
                    <div class="result-item highlight">
                        <span class="label">Friction Factor (f):</span>
                        <span class="value" id="res-f">---</span>
                    </div>
                </div>
            </aside>

            <section class="chart-container card">
                <div id="moodyChart"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
